<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WishlistWatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0f14;--surface:#181922;--border:#2a2b38;--text:#f0f0f5;--muted:#7a7b8e;--amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);--green:#34d399;--red:#f87171;--radius:10px}
body{width:340px;min-height:200px;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;line-height:1.5}
.header{display:flex;align-items:center;gap:8px;padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.logo{width:26px;height:26px;background:var(--amber);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-text{font-weight:700;font-size:15px;letter-spacing:-0.3px}
.logo-text span{color:var(--amber)}
.header-right{margin-left:auto}
.logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;padding:4px 6px;border-radius:5px}
.logout-btn:hover{color:var(--text);background:var(--border)}
.content{padding:16px}
.login-title{font-size:16px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color 0.15s}
.field input:focus{border-color:var(--amber)}
.btn{width:100%;padding:9px 14px;border-radius:var(--radius);border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-top:4px}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-amber{background:var(--amber);color:#000}
.btn-amber:hover:not(:disabled){opacity:0.9}
.btn-outline{background:var(--surface);color:var(--text);border:1px solid var(--border);margin-top:8px}
.btn-outline:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
.msg{padding:8px 10px;border-radius:7px;font-size:12px;margin-bottom:12px}
.msg-error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red)}
.msg-success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);color:var(--green)}
.price-row{display:flex;align-items:center;gap:8px;background:var(--amber-dim);border:1px solid rgba(245,166,35,0.2);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px}
.price-label{font-size:11px;color:var(--muted)}
.price-value{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--amber)}
.price-original{font-size:12px;color:var(--muted);text-decoration:line-through;margin-right:4px}
.price-sale-badge{font-size:10px;background:rgba(248,113,113,0.15);color:var(--red);border-radius:4px;padding:1px 5px;margin-left:6px}
.target-row{display:flex;gap:8px;align-items:flex-end}
.target-row .field{flex:1;margin-bottom:0}
.target-row .btn{width:auto;padding:9px 16px;margin-top:0;flex-shrink:0}
.fetching{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:8px 0}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.url-field{margin-bottom:12px}
.view-dashboard{text-align:center;margin-top:10px;font-size:11px;color:var(--muted)}
.view-dashboard a{color:var(--amber);text-decoration:none}
.view-dashboard a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="header">
  <div class="logo">🏷</div>
  <div class="logo-text">Wishlist<span>Watcher</span></div>
  <div class="header-right">
    <button class="logout-btn" id="logoutBtn" style="display:none">Sign out</button>
  </div>
</div>
<div class="content" id="app"></div>
<div style="text-align:center;padding:4px 0 8px;font-size:10px;color:#3a3b4a">v1.2.1</div>
<script src="popup.js"></script>
</body>
</html>
